notify:
  enabled: false
  provider: webhook   # console | webhook | zalo_oa | none

  webhook:
    url: "http://127.0.0.1:8000/notify"
    timeout_sec: 10

  zalo:
    access_token: ""
    recipient_uid: ""
    send_api_url: ""
    timeout_sec: 10

  send_on:
    - worker_absence_start
    - worker_absence_end
    - backlog_alert_start
    - backlog_alert_end